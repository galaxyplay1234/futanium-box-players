name: Create Keystore

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
          -keystore futanium-release.keystore \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias futanium \
          -storepass futanium123 \
          -keypass futanium123 \
          -dname "CN=Futanium,O=Box,C=BR"

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: futanium-keystore
          path: futanium-release.keystore